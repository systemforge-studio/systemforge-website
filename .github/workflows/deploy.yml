name: Deploy Vite site to GitHub Pages

on:
  push:
    tags: ["**"]
  pull_request:
    branches: ["dev", "main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.event.deleted == false) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /systemforge-website/

      - name: Upload Pages artifact
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.event.deleted == false }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.event.deleted == false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
